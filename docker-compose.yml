services:
  c1:
    build: .
    network_mode: host
    environment:
      - SEND_ADDRESS=127.0.0.1:8081
      - LISTEN_PORT=8080
      - OPERATION=inc
      - SOCKETTYPE=udp

  c2:
    build: .
    network_mode: host
    environment:
      - SEND_ADDRESS=127.0.0.1:8082
      - LISTEN_PORT=8081
      - OPERATION=shl
      - SOCKETTYPE=udp

  c3:
    build: .
    network_mode: host
    environment:
      - SEND_ADDRESS=127.0.0.1:8090
      - LISTEN_PORT=8082
      - OPERATION=dec
      - SOCKETTYPE=udp
